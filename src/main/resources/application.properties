spring.application.name=examTester

# ===============================
# DATASOURCE (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/preguntas_examen?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# ===============================
# HIKARI (pool de conexiones)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=ExamTesterPool

# ===============================
# SERVER
# ===============================
server.port=8081

# ===============================
# TAMAŃO DE ARCHIVOS DE CARGA MASIVA
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# PROPERTIE URL FRONT
# ===============================
app.cors.allowed-origins=http://192.168.0.2:3000

